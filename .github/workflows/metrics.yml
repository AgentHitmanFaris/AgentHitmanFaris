---
name: Metrics
"on":
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_branch: github-metrics
          committer_message: "build: update `${filename}`"
          user: ${{ github.repository_owner }}
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Malaysia
          config_order: >-
            base.header, base.activity+community, base.repositories,
            base.metadata
          config_padding: 0, 10%
          config_twemoji: true
          plugin_lines: true
          filename: github-metrics.svg

  notable:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_branch: github-metrics
          committer_message: "build: update `${filename}`"
          user: ${{ github.repository_owner }}
          template: classic
          config_timezone: Malaysia
          base: ""
          config_display: large
          config_output: svg
          filename: notable.svg
          plugin_notable: true
          plugin_notable_from: organization
          plugin_notable_types: commit

  habits:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_branch: github-metrics
          committer_message: "build: update `${filename}`"
          user: ${{ github.repository_owner }}
          template: classic
          config_timezone: Malaysia
          base: ""
          config_display: large
          config_output: svg
          filename: habits.svg
          plugin_habits: true
          plugin_habits_facts: true
          plugin_habits_charts: true

  achievements:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_branch: github-metrics
          committer_message: "build: update `${filename}`"
          user: ${{ github.repository_owner }}
          template: classic
          config_timezone: Malaysia
          base: ""
          config_display: large
          config_output: svg
          filename: achievements.svg
          plugin_achievements: true
          plugin_achievements_display: compact
          plugin_achievements_secrets: true
          plugin_achievements_threshold: C
